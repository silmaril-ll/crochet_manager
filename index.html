<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#F5F3EF">
    <title>Crochet Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #F5F3EF;
            --bg-secondary: #FFFFFF;
            --bg-hover: #E8E5DF;
            --text-primary: #2C2416;
            --text-secondary: #6B6356;
            --border: #D4CFC4;
            --accent: #B4916C;
            --accent-hover: #9A7A5A;
            --shadow: rgba(44, 36, 22, 0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            position: relative;
            z-index: 10;
        }

        .sidebar.collapsed {
            transform: translateX(-280px);
        }
        
        @media (min-width: 769px) {
            .sidebar.collapsed ~ .main-content {
                margin-left: -280px;
            }
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .app-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .search-bar {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-primary);
            font-size: 14px;
            outline: none;
        }

        .search-bar:focus {
            border-color: var(--accent);
        }

        .project-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .project-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .project-item:hover {
            background: var(--bg-hover);
        }

        .project-item.active {
            background: var(--bg-hover);
        }

        .project-name {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .project-meta {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .project-tags {
            font-size: 11px;
            color: var(--accent);
            margin-top: 4px;
        }

        .add-project-btn {
            margin: 12px;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .add-project-btn:hover {
            background: var(--accent-hover);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: margin-left 0.3s ease;
        }

        .top-bar {
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .menu-toggle {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 4px;
            color: var(--text-primary);
        }

        .tab-buttons {
            display: flex;
            gap: 8px;
        }

        .tab-btn {
            padding: 8px 16px;
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        /* Counter View */
        .counter-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .project-header {
            margin-bottom: 24px;
        }

        .project-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .project-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 13px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-small:hover {
            background: var(--bg-hover);
        }

        .section-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .section-tab {
            padding: 10px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            position: relative;
        }

        .section-tab.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .section-tab:hover {
            background: var(--bg-hover);
        }

        .section-tab.active:hover {
            background: var(--accent-hover);
        }

        .counter-display {
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 48px;
            text-align: center;
            margin-bottom: 24px;
        }

        .counter-number {
            font-size: 72px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 24px;
        }

        .counter-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .counter-btn {
            width: 80px;
            height: 80px;
            font-size: 32px;
            border: 2px solid var(--border);
            background: var(--bg-secondary);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            color: var(--text-primary);
        }

        .counter-btn:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
        }

        .counter-btn:active {
            transform: scale(0.95);
        }

        /* Yarn Inventory */
        .yarn-list {
            max-width: 800px;
        }

        .yarn-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: start;
        }

        .yarn-info {
            flex: 1;
        }

        .yarn-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .yarn-details {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .delete-btn {
            padding: 6px 12px;
            background: none;
            border: 1px solid #D44;
            color: #D44;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: #D44;
            color: white;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--accent);
        }

        .form-actions {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        /* Loading indicator */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(245, 243, 239, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Sync status indicator */
        .sync-status {
            font-size: 11px;
            color: var(--text-secondary);
            padding: 4px 8px;
            margin-left: auto;
        }

        .sync-status.error {
            color: #D44;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: 0;
                top: 57px;
                bottom: 0;
                z-index: 50;
                box-shadow: 2px 0 8px var(--shadow);
            }
            
            .sidebar.collapsed {
                box-shadow: none;
            }
            
            .top-bar {
                position: relative;
                z-index: 100;
            }
            
            .counter-number {
                font-size: 56px;
            }

            .counter-btn {
                width: 64px;
                height: 64px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在连接数据库…</div>
    </div>

    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1 class="app-title">织女计数器</h1>
                <input type="text" class="search-bar" id="searchBar" placeholder="搜索项目名称或标签…">
            </div>
            <div class="project-list" id="projectList"></div>
            <button class="add-project-btn" id="addProjectBtn">+ 新项目</button>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="top-bar">
                <button class="menu-toggle" id="menuToggle">☰</button>
                <div class="tab-buttons">
                    <button class="tab-btn active" data-tab="projects">项目</button>
                    <button class="tab-btn" data-tab="yarn">毛线库存</button>
                </div>
                <div class="sync-status" id="syncStatus"></div>
            </div>

            <div class="content-area" id="contentArea">
                <div id="projectsView"></div>
                <div id="yarnView" style="display: none;"></div>
            </div>
        </div>
    </div>

    <!-- New Project Modal -->
    <div class="modal" id="projectModal">
        <div class="modal-content">
            <h2 class="modal-title">新项目</h2>
            <div class="form-group">
                <label class="form-label">项目名称</label>
                <input type="text" class="form-input" id="projectName">
            </div>
            <div class="form-group">
                <label class="form-label">标签（用逗号分隔）</label>
                <input type="text" class="form-input" id="projectTags" placeholder="披肩, 毛毯, 玩偶等">
            </div>
            <div class="form-actions">
                <button class="btn btn-secondary" id="cancelProject">取消</button>
                <button class="btn btn-primary" id="saveProject">创建</button>
            </div>
        </div>
    </div>

    <!-- New Section Modal -->
    <div class="modal" id="sectionModal">
        <div class="modal-content">
            <h2 class="modal-title">新分区</h2>
            <div class="form-group">
                <label class="form-label">分区名称</label>
                <input type="text" class="form-input" id="sectionName" placeholder="中心区域，玩偶头部，第一组等">
            </div>
            <div class="form-actions">
                <button class="btn btn-secondary" id="cancelSection">取消</button>
                <button class="btn btn-primary" id="saveSection">添加</button>
            </div>
        </div>
    </div>

    <!-- Edit Project Modal -->
    <div class="modal" id="editProjectModal">
        <div class="modal-content">
            <h2 class="modal-title">编辑项目</h2>
            <div class="form-group">
                <label class="form-label">项目名称</label>
                <input type="text" class="form-input" id="editProjectName">
            </div>
            <div class="form-group">
                <label class="form-label">标签（用逗号分隔）</label>
                <input type="text" class="form-input" id="editProjectTags">
            </div>
            <div class="form-group">
                <label class="form-label">状态</label>
                <select class="form-input" id="editProjectStatus">
                    <option value="in-progress">进行中</option>
                    <option value="completed">已完成</option>
                </select>
            </div>
            <div class="form-actions">
                <button class="btn btn-secondary" id="cancelEditProject">取消</button>
                <button class="btn btn-primary" id="saveEditProject">保存</button>
            </div>
        </div>
    </div>

    <!-- Add Yarn Modal -->
    <div class="modal" id="yarnModal">
        <div class="modal-content">
            <h2 class="modal-title">添加线材</h2>
            <div class="form-group">
                <label class="form-label">线材名称</label>
                <input type="text" class="form-input" id="yarnName">
            </div>
            <div class="form-group">
                <label class="form-label">品牌</label>
                <input type="text" class="form-input" id="yarnBrand">
            </div>
            <div class="form-group">
                <label class="form-label">数量</label>
                <input type="text" class="form-input" id="yarnAmount" placeholder="200g，1卷，一扣扣等">
            </div>
            <div class="form-actions">
                <button class="btn btn-secondary" id="cancelYarn">取消</button>
                <button class="btn btn-primary" id="saveYarn">添加</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // Supabase Configuration
        // ==========================================
        const SUPABASE_URL = 'https://egjwykgrbrwrefklvsox.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_XxpbCDwRp526mAtCisdaOw_erJRU0Mf';

        // Helper: make Supabase REST API calls
        async function supabase(table, method = 'GET', body = null, query = '') {
            const url = `${SUPABASE_URL}/rest/v1/${table}${query}`;
            const headers = {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': method === 'POST' ? 'return=representation' : 
                          method === 'PATCH' ? 'return=representation' :
                          method === 'DELETE' ? 'return=minimal' : ''
            };
            
            const options = { method, headers };
            if (body) options.body = JSON.stringify(body);
            
            const res = await fetch(url, options);
            if (!res.ok) {
                const err = await res.text();
                throw new Error(`Supabase ${method} ${table} failed: ${err}`);
            }
            if (method === 'DELETE') return null;
            return res.json();
        }

        // ==========================================
        // Data Layer - Supabase Operations
        // ==========================================

        // Local state (for UI rendering)
        let data = {
            projects: [],
            yarn: [],
            currentProjectId: null,
            currentSectionId: null
        };

        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('active', show);
        }

        function showSyncStatus(msg, isError = false) {
            const el = document.getElementById('syncStatus');
            el.textContent = msg;
            el.className = 'sync-status' + (isError ? ' error' : '');
            if (!isError) {
                setTimeout(() => { el.textContent = ''; }, 2000);
            }
        }

        // Load all data from Supabase
        async function loadData() {
            // Fetch projects (sorted by created desc - newest first)
            const projects = await supabase('projects', 'GET', null, '?order=created.desc');
            // Fetch all sections
            const sections = await supabase('sections', 'GET', null, '?order=id.asc');
            // Fetch all yarn
            const yarn = await supabase('yarn', 'GET', null, '?order=id.desc');

            // Assemble projects with their sections
            data.projects = projects.map(p => ({
                id: p.id,
                name: p.name,
                tags: p.tags || [],
                created: p.created,
                status: p.status,
                completed: p.completed,
                sections: sections.filter(s => s.project_id === p.id).map(s => ({
                    id: s.id,
                    name: s.name,
                    count: s.count
                }))
            }));

            data.yarn = yarn;
        }

        // Save a new project + its default section to Supabase
        async function saveNewProject(project) {
            showSyncStatus('保存中…');
            // Insert project
            await supabase('projects', 'POST', {
                id: project.id,
                name: project.name,
                tags: project.tags,
                created: project.created,
                status: project.status
            });
            // Insert default section
            for (const section of project.sections) {
                await supabase('sections', 'POST', {
                    id: section.id,
                    project_id: project.id,
                    name: section.name,
                    count: section.count
                });
            }
            showSyncStatus('已保存 ✓');
        }

        // Update project details
        async function updateProject(project) {
            showSyncStatus('保存中…');
            const body = {
                name: project.name,
                tags: project.tags,
                status: project.status,
                completed: project.completed || null
            };
            await supabase('projects', 'PATCH', body, `?id=eq.${project.id}`);
            showSyncStatus('已保存 ✓');
        }

        // Delete a project (sections cascade-delete automatically)
        async function deleteProjectFromDB(projectId) {
            showSyncStatus('删除中…');
            await supabase('projects', 'DELETE', null, `?id=eq.${projectId}`);
            showSyncStatus('已删除 ✓');
        }

        // Add a new section
        async function saveNewSection(section, projectId) {
            showSyncStatus('保存中…');
            await supabase('sections', 'POST', {
                id: section.id,
                project_id: projectId,
                name: section.name,
                count: section.count
            });
            showSyncStatus('已保存 ✓');
        }

        // Update section count
        async function updateSectionCount(sectionId, count) {
            // No loading text for counter - keep it snappy
            await supabase('sections', 'PATCH', { count }, `?id=eq.${sectionId}`);
        }

        // Delete a section
        async function deleteSectionFromDB(sectionId) {
            showSyncStatus('删除中…');
            await supabase('sections', 'DELETE', null, `?id=eq.${sectionId}`);
            showSyncStatus('已删除 ✓');
        }

        // Add yarn
        async function saveNewYarn(yarn) {
            showSyncStatus('保存中…');
            await supabase('yarn', 'POST', {
                id: yarn.id,
                name: yarn.name,
                brand: yarn.brand,
                amount: yarn.amount
            });
            showSyncStatus('已保存 ✓');
        }

        // Delete yarn
        async function deleteYarnFromDB(yarnId) {
            showSyncStatus('删除中…');
            await supabase('yarn', 'DELETE', null, `?id=eq.${yarnId}`);
            showSyncStatus('已删除 ✓');
        }

        // ==========================================
        // Initialize App
        // ==========================================
        async function init() {
            showLoading(true);
            try {
                await loadData();
                showLoading(false);
                
                renderProjects();
                renderYarn();
                setupEventListeners();
                
                if (data.projects.length > 0) {
                    selectProject(data.projects[0].id);
                } else {
                    showEmptyProjectState();
                }
            } catch (err) {
                showLoading(false);
                console.error('Failed to load data:', err);
                showSyncStatus('连接失败，请检查网络', true);
                // Fallback: still show the UI
                renderProjects();
                renderYarn();
                setupEventListeners();
                showEmptyProjectState();
            }
        }

        // ==========================================
        // Event Listeners (updated for async)
        // ==========================================
        function setupEventListeners() {
            // Menu toggle
            document.getElementById('menuToggle').addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('collapsed');
            });

            // Tab switching
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    const tab = btn.dataset.tab;
                    if (tab === 'projects') {
                        document.getElementById('projectsView').style.display = 'block';
                        document.getElementById('yarnView').style.display = 'none';
                    } else {
                        document.getElementById('projectsView').style.display = 'none';
                        document.getElementById('yarnView').style.display = 'block';
                    }
                });
            });

            // Add project
            document.getElementById('addProjectBtn').addEventListener('click', () => {
                document.getElementById('projectName').value = '';
                document.getElementById('projectTags').value = '';
                document.getElementById('projectModal').classList.add('active');
            });

            document.getElementById('cancelProject').addEventListener('click', () => {
                document.getElementById('projectModal').classList.remove('active');
            });

            document.getElementById('saveProject').addEventListener('click', async () => {
                const name = document.getElementById('projectName').value.trim();
                const tags = document.getElementById('projectTags').value.trim();
                
                if (!name) {
                    alert('请输入项目名称');
                    return;
                }

                const project = {
                    id: Date.now(),
                    name: name,
                    tags: tags ? tags.split(',').map(t => t.trim()) : [],
                    created: new Date().toISOString(),
                    status: 'in-progress',
                    sections: [
                        { id: Date.now() + 1, name: '主体', count: 0 }
                    ]
                };

                try {
                    await saveNewProject(project);
                    data.projects.unshift(project);
                    renderProjects();
                    selectProject(project.id);
                } catch (err) {
                    console.error(err);
                    showSyncStatus('保存失败', true);
                }
                document.getElementById('projectModal').classList.remove('active');
            });

            // Add section
            document.getElementById('cancelSection').addEventListener('click', () => {
                document.getElementById('sectionModal').classList.remove('active');
            });

            document.getElementById('saveSection').addEventListener('click', async () => {
                const name = document.getElementById('sectionName').value.trim();
                
                if (!name) {
                    alert('请输入分区名称');
                    return;
                }

                const project = data.projects.find(p => p.id === data.currentProjectId);
                if (project) {
                    const section = { id: Date.now(), name: name, count: 0 };
                    try {
                        await saveNewSection(section, project.id);
                        project.sections.push(section);
                        renderProjectView();
                    } catch (err) {
                        console.error(err);
                        showSyncStatus('保存失败', true);
                    }
                    document.getElementById('sectionModal').classList.remove('active');
                }
            });

            // Edit project
            document.getElementById('cancelEditProject').addEventListener('click', () => {
                document.getElementById('editProjectModal').classList.remove('active');
            });

            document.getElementById('saveEditProject').addEventListener('click', async () => {
                const project = data.projects.find(p => p.id === data.currentProjectId);
                if (project) {
                    project.name = document.getElementById('editProjectName').value.trim();
                    project.tags = document.getElementById('editProjectTags').value.trim()
                        .split(',').map(t => t.trim()).filter(t => t);
                    project.status = document.getElementById('editProjectStatus').value;
                    
                    if (project.status === 'completed' && !project.completed) {
                        project.completed = new Date().toISOString();
                    }
                    
                    try {
                        await updateProject(project);
                    } catch (err) {
                        console.error(err);
                        showSyncStatus('保存失败', true);
                    }
                    renderProjects();
                    renderProjectView();
                    document.getElementById('editProjectModal').classList.remove('active');
                }
            });

            // Search
            document.getElementById('searchBar').addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                renderProjects(query);
            });

            // Add yarn
            document.getElementById('cancelYarn').addEventListener('click', () => {
                document.getElementById('yarnModal').classList.remove('active');
            });

            document.getElementById('saveYarn').addEventListener('click', async () => {
                const name = document.getElementById('yarnName').value.trim();
                const brand = document.getElementById('yarnBrand').value.trim();
                const amount = document.getElementById('yarnAmount').value.trim();

                if (!name) {
                    alert('请输入线材名称');
                    return;
                }

                const yarn = {
                    id: Date.now(),
                    name: name,
                    brand: brand,
                    amount: amount
                };

                try {
                    await saveNewYarn(yarn);
                    data.yarn.unshift(yarn);
                } catch (err) {
                    console.error(err);
                    showSyncStatus('保存失败', true);
                }
                renderYarn();
                document.getElementById('yarnModal').classList.remove('active');
                document.getElementById('yarnName').value = '';
                document.getElementById('yarnBrand').value = '';
                document.getElementById('yarnAmount').value = '';
            });
        }

        // ==========================================
        // Render Functions (unchanged UI)
        // ==========================================

        function renderProjects(query = '') {
            const list = document.getElementById('projectList');
            const filtered = data.projects.filter(p => {
                if (!query) return true;
                return p.name.toLowerCase().includes(query) ||
                       p.tags.some(t => t.toLowerCase().includes(query));
            });

            if (filtered.length === 0) {
                list.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-secondary);">暂未添加项目</div>';
                return;
            }

            list.innerHTML = filtered.map(project => {
                const date = project.status === 'completed' && project.completed
                    ? new Date(project.completed).toLocaleDateString()
                    : new Date(project.created).toLocaleDateString();
                const label = project.status === 'completed' ? '已完成' : '创建于';
                
                return `
                    <div class="project-item ${project.id === data.currentProjectId ? 'active' : ''}" 
                         onclick="selectProject(${project.id})">
                        <div class="project-name">${project.name}</div>
                        <div class="project-meta">${label}: ${date}</div>
                        ${project.tags.length > 0 ? `<div class="project-tags">${project.tags.join(', ')}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        function selectProject(id) {
            data.currentProjectId = id;
            const project = data.projects.find(p => p.id === id);
            if (project && project.sections.length > 0) {
                data.currentSectionId = project.sections[0].id;
            }
            renderProjects();
            renderProjectView();
        }

        function showEmptyProjectState() {
            document.getElementById('projectsView').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">🧶</div>
                    <p>暂未添加项目。点击 + 按钮创建第一个项目吧~</p>
                </div>
            `;
        }

        function renderProjectView() {
            const project = data.projects.find(p => p.id === data.currentProjectId);
            if (!project) {
                showEmptyProjectState();
                return;
            }

            const section = project.sections.find(s => s.id === data.currentSectionId);
            if (!section) {
                if (project.sections.length > 0) {
                    data.currentSectionId = project.sections[0].id;
                    renderProjectView();
                }
                return;
            }
            
            document.getElementById('projectsView').innerHTML = `
                <div class="counter-container">
                    <div class="project-header">
                        <h2 class="project-title">${project.name}</h2>
                        <div class="project-actions">
                            <button class="btn-small" onclick="editProject()">编辑项目</button>
                            <button class="btn-small" onclick="addSection()">+ 添加分区</button>
                            ${project.sections.length > 1 ? `<button class="btn-small" style="color: #D44; border-color: #D44;" onclick="deleteCurrentSection()">删除分区</button>` : ''}
                            <button class="btn-small" style="color: #D44; border-color: #D44;" onclick="deleteProject()">删除项目</button>
                        </div>
                    </div>

                    <div class="section-tabs">
                        ${project.sections.map(s => `
                            <div class="section-tab ${s.id === data.currentSectionId ? 'active' : ''}" 
                                 onclick="selectSection(${s.id})">
                                ${s.name}
                            </div>
                        `).join('')}
                    </div>

                    <div class="counter-display">
                        <div class="counter-number">${section.count}</div>
                        <div class="counter-buttons">
                            <button class="counter-btn" onclick="decrementCounter()">−</button>
                            <button class="counter-btn" onclick="resetCounter()">↻</button>
                            <button class="counter-btn" onclick="incrementCounter()">+</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // Section management
        function selectSection(id) {
            data.currentSectionId = id;
            renderProjectView();
        }

        function addSection() {
            document.getElementById('sectionName').value = '';
            document.getElementById('sectionModal').classList.add('active');
        }

        async function deleteSection(id) {
            if (!confirm('确认删除该分区？')) return;
            
            const project = data.projects.find(p => p.id === data.currentProjectId);
            if (project) {
                try {
                    await deleteSectionFromDB(id);
                    project.sections = project.sections.filter(s => s.id !== id);
                    if (data.currentSectionId === id && project.sections.length > 0) {
                        data.currentSectionId = project.sections[0].id;
                    }
                    renderProjectView();
                } catch (err) {
                    console.error(err);
                    showSyncStatus('删除失败', true);
                }
            }
        }

        function deleteCurrentSection() {
            deleteSection(data.currentSectionId);
        }

        // Counter operations
        async function incrementCounter() {
            const project = data.projects.find(p => p.id === data.currentProjectId);
            const section = project.sections.find(s => s.id === data.currentSectionId);
            section.count++;
            renderProjectView();
            try {
                await updateSectionCount(section.id, section.count);
            } catch (err) {
                console.error(err);
                section.count--;
                renderProjectView();
                showSyncStatus('同步失败', true);
            }
        }

        async function decrementCounter() {
            const project = data.projects.find(p => p.id === data.currentProjectId);
            const section = project.sections.find(s => s.id === data.currentSectionId);
            if (section.count > 0) {
                section.count--;
                renderProjectView();
                try {
                    await updateSectionCount(section.id, section.count);
                } catch (err) {
                    console.error(err);
                    section.count++;
                    renderProjectView();
                    showSyncStatus('同步失败', true);
                }
            }
        }

        async function resetCounter() {
            if (!confirm('确认将计数器重置为0？')) return;
            
            const project = data.projects.find(p => p.id === data.currentProjectId);
            const section = project.sections.find(s => s.id === data.currentSectionId);
            const oldCount = section.count;
            section.count = 0;
            renderProjectView();
            try {
                await updateSectionCount(section.id, 0);
            } catch (err) {
                console.error(err);
                section.count = oldCount;
                renderProjectView();
                showSyncStatus('同步失败', true);
            }
        }

        // Project management
        function editProject() {
            const project = data.projects.find(p => p.id === data.currentProjectId);
            if (project) {
                document.getElementById('editProjectName').value = project.name;
                document.getElementById('editProjectTags').value = project.tags.join(', ');
                document.getElementById('editProjectStatus').value = project.status;
                document.getElementById('editProjectModal').classList.add('active');
            }
        }

        async function deleteProject() {
            if (!confirm('确认删除该项目？此操作无法撤销。')) return;
            
            try {
                await deleteProjectFromDB(data.currentProjectId);
                data.projects = data.projects.filter(p => p.id !== data.currentProjectId);
                
                if (data.projects.length > 0) {
                    selectProject(data.projects[0].id);
                } else {
                    data.currentProjectId = null;
                    data.currentSectionId = null;
                    showEmptyProjectState();
                }
                renderProjects();
            } catch (err) {
                console.error(err);
                showSyncStatus('删除失败', true);
            }
        }

        // Render yarn inventory
        function renderYarn() {
            const view = document.getElementById('yarnView');
            
            if (data.yarn.length === 0) {
                view.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🧵</div>
                        <p>暂未添加线材库存。</p>
                        <button class="btn btn-primary" style="margin-top: 16px; max-width: 200px;" onclick="openYarnModal()">添加线材</button>
                    </div>
                `;
                return;
            }

            view.innerHTML = `
                <div style="max-width: 800px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                        <h2 style="font-size: 24px; font-weight: 600;">线材库存</h2>
                        <button class="btn btn-primary" style="width: auto; max-width: 150px;" onclick="openYarnModal()">+ 添加线材</button>
                    </div>
                    <div class="yarn-list">
                        ${data.yarn.map(yarn => `
                            <div class="yarn-item">
                                <div class="yarn-info">
                                    <div class="yarn-name">${yarn.name}</div>
                                    <div class="yarn-details">
                                        ${yarn.brand ? `品牌: ${yarn.brand}` : ''}
                                        ${yarn.brand && yarn.amount ? ' · ' : ''}
                                        ${yarn.amount ? `数量: ${yarn.amount}` : ''}
                                    </div>
                                </div>
                                <button class="delete-btn" onclick="deleteYarn(${yarn.id})">删除</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function openYarnModal() {
            document.getElementById('yarnModal').classList.add('active');
        }

        async function deleteYarn(id) {
            if (!confirm('确认删除该线材？')) return;
            try {
                await deleteYarnFromDB(id);
                data.yarn = data.yarn.filter(y => y.id !== id);
                renderYarn();
            } catch (err) {
                console.error(err);
                showSyncStatus('删除失败', true);
            }
        }

        // Start the app
        init();
    </script>
</body>
</html>
